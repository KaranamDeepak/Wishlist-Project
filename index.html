<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumière — Premium E-Commerce</title>
  <meta name="description" content="Shop premium products and save your favorites to wishlists. Combine and merge lists to curate the perfect collection." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="container header-inner">
      <a href="#" class="logo" id="logo-link">
        <div class="logo-icon">✦</div>
        <span class="logo-text">Lumière</span>
      </a>

      <nav aria-label="Main navigation">
        <button class="nav-link active" data-view="shop" id="nav-shop">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          Shop
        </button>
        <button class="nav-link" data-view="wishlists" id="nav-wishlists">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          Wishlists
          <span class="badge" id="wishlist-badge" style="display:none">0</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main>

    <!-- Shop View -->
    <section id="shop-view">
      <div class="container">
        <div class="page-hero">
          <h1>Discover Something Beautiful</h1>
          <p>Curated products across electronics, clothing, home, books, and sports.</p>
        </div>

        <div class="toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="search" id="search-input" placeholder="Search products…" aria-label="Search products" />
          </div>
          <div class="filters-wrap" id="category-filters" role="group" aria-label="Category filters"></div>
        </div>

        <div id="product-grid" aria-label="Product catalog"></div>
      </div>
    </section>

    <!-- Wishlists View -->
    <section id="wishlists-view" style="display:none">
      <div class="container">
        <div class="page-hero">
          <h1>Your Wishlists</h1>
          <p>Save, organise, and merge your favourite products.</p>
        </div>

        <!-- Merge panel -->
        <div class="merge-panel" role="region" aria-label="Merge wishlists">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          <span id="merge-hint">Select two wishlists to merge them.</span>
          <button class="btn-primary" id="merge-btn" disabled aria-label="Merge selected wishlists">
            Merge Selected
          </button>
        </div>

        <!-- Header row -->
        <div class="wishlists-header">
          <h2>All Lists</h2>
          <button class="btn-secondary" id="btn-create-list">+ New Wishlist</button>
        </div>

        <!-- Inline create form -->
        <div id="create-list-form" role="form" aria-label="Create new wishlist">
          <input type="text" id="new-list-name-input" placeholder="Wishlist name…" maxlength="60" aria-label="New wishlist name" />
          <button class="btn-primary" id="create-list-submit">Create</button>
          <button class="btn-secondary" id="create-list-cancel">Cancel</button>
        </div>

        <div id="wishlists-container" aria-label="Wishlist cards"></div>
      </div>
    </section>

    <!-- Detail View -->
    <section id="detail-view" style="display:none">
      <div class="container">
        <div class="detail-header">
          <button class="btn-icon" id="detail-back-btn" aria-label="Back to wishlists">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
          </button>
          <div>
            <h2 id="detail-list-name"></h2>
            <p id="detail-item-count"></p>
          </div>
        </div>
        <div id="detail-items" aria-label="Wishlist items"></div>
      </div>
    </section>

  </main>

  <!-- ── Add-to-Wishlist Modal ───────────────────────────────────────────── -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Add to Wishlist</h2>
      <span id="modal-product-name"></span>

      <label for="modal-list-select">Choose a list</label>
      <select id="modal-list-select" aria-label="Select wishlist"></select>

      <button id="modal-create-list" type="button">+ Create a new list</button>

      <label for="modal-note">Note (optional)</label>
      <textarea id="modal-note" placeholder="e.g. Birthday gift, Size L…" rows="3"></textarea>

      <div id="modal-feedback" role="alert"></div>

      <div class="modal-actions">
        <button class="btn-primary" id="modal-confirm">Add to List</button>
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────────────────── -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- ── Scripts ────────────────────────────────────────────────────────── -->
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
